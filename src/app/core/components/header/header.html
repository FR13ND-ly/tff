<header class="sticky top-4 z-50 w-full px-4 sm:px-6 transition-all duration-300 mt-4">
    <div
        class="max-w-6xl mx-auto rounded-2xl border border-white/20 dark:border-slate-800/50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg shadow-[0_8px_30px_rgb(0,0,0,0.12)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.5)]">

        <div class="flex items-center justify-between h-16 px-4 md:px-6">

            <div class="flex items-center gap-4 group cursor-pointer" routerLink="/">
                <div
                    class="relative flex items-center justify-center w-11 h-11 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-600 shadow-inner overflow-hidden">
                    <div
                        class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    </div>
                    <img src="/icon.png" alt="FR13ND" class="size-10 object-cover">
                </div>

                <div class="flex flex-col justify-center">
                    <span
                        class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-600 dark:from-white dark:to-slate-300 leading-tight">
                        TFF HQ
                    </span>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span
                            class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
                        <span
                            class="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-[0.2em]">Server
                            2327</span>
                    </div>
                </div>
            </div>

            <nav
                class="hidden md:flex items-center gap-1 bg-slate-100/50 dark:bg-slate-800/50 p-1 rounded-xl border border-slate-200/50 dark:border-slate-700/50">

                <a routerLink="/bear-trap"
                    routerLinkActive="bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white font-semibold"
                    [routerLinkActiveOptions]="{exact: true}"
                    class="px-4 py-1.5 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white rounded-lg transition-all duration-200">
                    {{ pack().header.bearTrap }}
                </a>

                <a routerLink="/crazy-joe"
                    routerLinkActive="bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white font-semibold"
                    class="px-4 py-1.5 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white rounded-lg transition-all duration-200">
                    {{ pack().header.crazyJoe }}
                </a>

                <a routerLink="/svs"
                    routerLinkActive="bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white font-semibold"
                    class="px-4 py-1.5 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white rounded-lg transition-all duration-200">
                    {{ pack().header.svs }}
                </a>
            </nav>

            <div class="flex items-center gap-2 md:gap-3">

                <div class="relative">
                    <button (click)="toggleLangMenu()"
                        class="flex items-center justify-center gap-1.5 px-3 h-9 text-xs font-bold rounded-xl border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-cyan-600 dark:hover:text-cyan-400 transition-all duration-200 cursor-pointer">
                        {{ currentLang().name }}
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                            class="w-4 h-4 transition-transform duration-200" [class.rotate-180]="isLangMenuOpen()">
                            <path fill-rule="evenodd"
                                d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
                                clip-rule="evenodd" />
                        </svg>
                    </button>

                    @if (isLangMenuOpen()) {
                    <div
                        class="absolute right-0 top-full mt-2 w-24 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.5)] overflow-hidden py-1.5 z-50 animate-fade-in origin-top-right">

                        @for (lang of availableLanguages; track lang.name; let i = $index) {
                        <button (click)="selectLanguage(i)"
                            class="w-full text-left px-4 py-2 text-sm font-bold transition-colors hover:bg-slate-100 dark:hover:bg-slate-700"
                            [class]="lang.name === currentLang().name ? 'text-cyan-600 dark:text-cyan-400 bg-cyan-50 dark:bg-cyan-900/20' : 'text-slate-600 dark:text-slate-300'">
                            {{ lang.name }}
                        </button>
                        }

                    </div>
                    }
                </div>

                <button (click)="toggleTheme()"
                    class="flex items-center justify-center w-9 h-9 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-cyan-600 dark:hover:text-cyan-400 transition-all duration-200 cursor-pointer"
                    aria-label="Toggle Theme">

                    @if (themeService.isDarkMode()) {
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                    </svg>
                    } @else {
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                    </svg>
                    }

                </button>

                <button
                    class="md:hidden flex items-center justify-center w-9 h-9 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                    </svg>
                </button>

            </div>
        </div>
    </div>
</header>
