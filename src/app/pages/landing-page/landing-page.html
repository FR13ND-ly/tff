<!-- landing-page.html -->
<div class="w-full flex flex-col gap-10">
  
  <div class="relative w-full h-[300px] md:h-[400px] rounded-2xl overflow-hidden shadow-xl border border-slate-200/20 dark:border-slate-800/50 flex flex-col items-center justify-center text-center px-4">
    <div class="absolute inset-0 bg-[url('/cover.avif')] bg-cover bg-center"></div>
    <div class="absolute inset-0 bg-slate-900/60 dark:bg-slate-950/70 backdrop-blur-[2px]"></div>
    
    <div class="relative z-10 flex flex-col items-center gap-6">
      <h1 class="text-4xl md:text-6xl lg:text-7xl font-black text-white tracking-tight drop-shadow-2xl">
        {{ pack().landing.title }}
      </h1>
      
      <a href="https://discord.gg/BY62YfTR" target="_blank" rel="noopener noreferrer" class="inline-flex justify-center items-center gap-2 px-8 py-3.5 text-base font-bold text-white bg-[#5865F2] hover:bg-[#4752C4] rounded-xl shadow-lg shadow-[#5865F2]/30 hover:shadow-[#5865F2]/50 transition-all duration-300 hover:-translate-y-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="currentColor" viewBox="0 0 127.14 96.36">
          <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77.7,77.7,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.33,46,96.22,53,91.08,65.69,84.69,65.69Z"/>
        </svg>
        {{ pack().landing.discord }}
      </a>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 w-full max-w-6xl mx-auto mt-4">
    <!-- Folosim events() deoarece acum este un semnal computat -->
    @for (event of events(); track event.name) {
      <div [class]="'relative p-5 rounded-2xl border flex items-center gap-5 transition-all duration-300 ' + 
                   (event.hasPage ? 'bg-white dark:bg-[#111318] border-slate-200 dark:border-slate-800 hover:border-cyan-500/50 dark:hover:border-cyan-500/50 hover:shadow-lg hover:shadow-cyan-500/10 hover:-translate-y-1 cursor-pointer group' : 
                                    'bg-slate-50 dark:bg-[#0b0d10] border-slate-200/50 dark:border-slate-800/50 opacity-90')">
        
        @if (event.hasPage) {
          <a [routerLink]="event.route" class="absolute inset-0 z-10"></a>
        }

        <div class="relative w-16 h-16 shrink-0 flex items-center justify-center bg-slate-100 dark:bg-[#1a1d24] rounded-xl p-2 shadow-inner border border-slate-200/50 dark:border-slate-700/50">
           <img [src]="event.image" [alt]="event.name" class="w-full h-full object-contain drop-shadow-md transition-transform duration-300 group-hover:scale-110" />
        </div>

        <div class="flex flex-col flex-1">
          <div class="flex items-center justify-between mb-1">
            <h3 class="text-lg font-bold text-slate-900 dark:text-white leading-tight group-hover:text-cyan-600 dark:group-hover:text-cyan-400 transition-colors">
              {{ event.name }}
            </h3>
            
            @if (event.hasPage) {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 text-slate-300 dark:text-slate-600 group-hover:text-cyan-500 transition-colors">
                <path fill-rule="evenodd" d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
              </svg>
            }
          </div>
          
          <div class="flex flex-col gap-1 mt-1.5">
            @for (t of event.times; track t.time) {
              <div class="flex items-center gap-2 text-sm font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-cyan-500 dark:text-cyan-400">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
                <span class="text-slate-600 dark:text-slate-400">
                  @if (t.label) { <span class="text-slate-400 dark:text-slate-500 mr-1">{{ t.label }}:</span> }
                  <span class="text-slate-800 dark:text-slate-200 font-bold">{{ t.time }}</span>
                </span>
              </div>
            }
          </div>
        </div>
      </div>
    }
  </div>

</div>
