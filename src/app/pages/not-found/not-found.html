<div class="w-full min-h-[75vh] flex flex-col items-center justify-center py-12 px-4 animate-fade-in text-center relative overflow-hidden">
  
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-pink-500/10 dark:bg-pink-600/10 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-cyan-500/10 dark:bg-cyan-600/10 rounded-full blur-[80px] pointer-events-none"></div>

  <div class="relative z-10 flex flex-col items-center max-w-2xl">
    
    <div class="relative w-64 h-64 md:w-80 md:h-80 mb-8 rounded-3xl overflow-hidden shadow-2xl border-4 border-pink-500/20 dark:border-pink-500/30 bg-slate-100 dark:bg-[#111318] flex items-center justify-center rotate-3 hover:rotate-0 transition-transform duration-500">
      <img src="/not_found.png" alt="Lost Unicorn" class="w-full h-full object-cover opacity-90 drop-shadow-[0_0_15px_rgba(236,72,153,0.5)]" />
      <div class="absolute inset-0 bg-gradient-to-t from-slate-900/40 to-transparent"></div>
    </div>

    <h1 class="text-7xl md:text-9xl font-black tracking-tighter mb-4 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-pink-400 to-purple-500 drop-shadow-lg">
      {{ pack().notFound.title }}
    </h1>

    <h2 class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-white mb-4">
      {{ pack().notFound.subtitle }}
    </h2>

    <p class="text-base md:text-lg text-slate-600 dark:text-slate-400 font-medium mb-10 max-w-lg leading-relaxed">
      {{ pack().notFound.desc }}
    </p>

    <a routerLink="/" class="group relative inline-flex items-center justify-center gap-3 px-8 py-4 bg-white dark:bg-[#111318] text-slate-900 dark:text-white font-bold text-lg rounded-2xl border border-slate-200 dark:border-slate-800 shadow-lg hover:shadow-cyan-500/20 hover:border-cyan-500/50 transition-all duration-300 hover:-translate-y-1 overflow-hidden">
      <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-cyan-500/10 to-blue-500/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
      
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 text-cyan-500 relative z-10 transition-transform group-hover:-translate-x-1">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3" />
      </svg>
      <span class="relative z-10">{{ pack().notFound.button }}</span>
    </a>

  </div>
</div>
